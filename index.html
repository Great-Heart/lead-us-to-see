<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教育訓練報名平台</title>
  <!-- 預先建立連線，縮短首次 API 呼叫的握手時間 -->
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">
  <link rel="preconnect" href="https://oauth2.googleapis.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --brand:#E8732B; --brand-dark:#cf6420; --bg:#fff7f1; --line:#f0d9c8; --text:#333; }
    * { box-sizing:border-box; }
    body { font-family:"Microsoft JhengHei","Segoe UI",sans-serif; margin:0; background:var(--bg); color:var(--text); }
    header { background:var(--brand); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    header h1 { font-size:18px; margin:0; }
    .userbox { font-size:14px; display:flex; align-items:center; gap:12px; }
    .logout { background:rgba(255,255,255,.2); color:#fff; border:1px solid rgba(255,255,255,.5); border-radius:6px; padding:4px 12px; cursor:pointer; font-size:13px; }
    .logout:hover { background:rgba(255,255,255,.35); }
    main { max-width:960px; margin:0 auto; padding:20px; }
    .tabs { display:flex; gap:8px; border-bottom:2px solid var(--line); margin-bottom:16px; flex-wrap:wrap; }
    .tab { padding:10px 16px; cursor:pointer; border:none; background:none; font-size:15px; color:#888; border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab.active { color:var(--brand-dark); border-bottom-color:var(--brand); font-weight:bold; }
    .tab:disabled { color:#ccc; cursor:not-allowed; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:12px; }
    .card h3 { margin:0 0 6px; color:var(--brand-dark); }
    .meta { color:#777; font-size:14px; line-height:1.7; }
    .notice { background:#fff3e0; border:1px solid #ffcc80; color:#b26a00; border-radius:8px; padding:12px 14px; margin-bottom:14px; font-size:14px; }
    button.action { background:var(--brand); color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; font-size:14px; }
    button.action:hover { background:var(--brand-dark); }
    button.action:disabled { background:#e0b89a; cursor:not-allowed; }
    button.ghost { background:#fff; color:var(--brand-dark); border:1px solid var(--brand); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
    button.sm { padding:4px 10px; font-size:12px; border-radius:6px; }
    .status { display:inline-block; padding:2px 10px; border-radius:12px; font-size:13px; }
    .s-待審核 { background:#fff3e0; color:#b26a00; }
    .s-錄取   { background:#e6f4ea; color:#1e7e34; }
    .s-候補   { background:#e8eaf6; color:#3f51b5; }
    .s-婉拒, .s-取消 { background:#f1f1f1; color:#888; }
    .badge-sw { background:#e3f2fd; color:#1565c0; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:6px; }
    .badge-te { background:#f3e5f5; color:#6a1b9a; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:6px; }
    table { width:100%; border-collapse:collapse; background:#fff; font-size:14px; }
    th, td { border:1px solid var(--line); padding:7px 9px; text-align:left; }
    th { background:#fbe7d6; white-space:nowrap; }
    td.cname { min-width:160px; max-width:260px; } /* 課名最多兩行內 */
    .center { text-align:center; padding:40px 0; color:#999; }
    .signin-wrap { text-align:center; padding:60px 0; }
    #gbtn { display:inline-block; }
    .hint { color:#999; font-size:13px; margin-top:6px; }
    .err { color:#c0392b !important; }
    .ok  { color:#1e7e34 !important; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:100; }
    .modal { background:#fff; border-radius:10px; padding:24px; width:340px; max-width:90%; }
    .form-table { width:100%; border-collapse:collapse; }
    .form-table td { border:none; padding:5px 0; vertical-align:middle; }
    .form-table td:first-child { color:#555; white-space:nowrap; padding-right:14px; font-size:14px; min-width:90px; }
    .finput { width:100%; padding:7px 9px; border:1px solid #ccc; border-radius:6px; font-size:14px; font-family:inherit; }
    .finput:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 2px rgba(232,115,43,.15); }
    select.finput { background:#fff; cursor:pointer; }
    .req { color:#c0392b; }
    .subtabs { display:flex; gap:6px; margin-bottom:12px; }
    .subtab { padding:7px 14px; border:1px solid var(--line); border-radius:8px; cursor:pointer; font-size:14px; background:#fff; color:#666; }
    .subtab.active { background:var(--brand); color:#fff; border-color:var(--brand); }
  </style>
</head>
<body>
  <header>
    <h1>教育訓練報名平台</h1>
    <div class="userbox" id="userbox"></div>
  </header>
  <main>
    <div id="view-signin" class="signin-wrap">
      <h2>請用 Google 帳號登入後報名</h2>
      <div id="gbtn"></div>
      <p class="hint">登入只做身分驗證，用來辨識你的報名與紀錄。</p>
      <p class="hint err" id="signin-err"></p>
    </div>
    <div id="view-app" style="display:none;">
      <div class="tabs">
        <button class="tab active" data-tab="courses" id="tab-courses">課程報名</button>
        <button class="tab" data-tab="my" id="tab-my">我的報名</button>
        <button class="tab" data-tab="profile" id="tab-profile">個人資料</button>
        <button class="tab" data-tab="admin" id="tab-admin" style="display:none;">後台</button>
      </div>
      <div id="panel"></div>
    </div>
  </main>
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3 id="modal-title">確認報名</h3>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
  var GAS_URL   = 'https://script.google.com/macros/s/AKfycbw0cb9KW6DcA0HprkxQHtpqtRQzXVtjViNxHUAfgOcjD2kmjyhiETL2LX_PqipeSHEt7g/exec';
  var CLIENT_ID = '827349215437-1najkao8u6kcitn9rr765bu4eqhks4h3.apps.googleusercontent.com';

  var ID_TOKEN = null;
  var CURRENT  = null;
  var PROFILE_OK = false;   // 個人資料是否填完整
  var ADMIN_COURSE = '';
  var ADMIN_VIEW   = 'regs';

  // 前端記憶體快取：切分頁先秒顯示舊資料，再背景更新；寫入後設 null 失效
  var CACHE = { openCourses: null, profile: null, courses: null };

  function api(action, payload) {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: action, idToken: ID_TOKEN, payload: payload || {} })
    }).then(function(r) { return r.json(); })
      .then(function(res) { if (!res.ok) throw new Error(res.error || '伺服器錯誤'); return res.data; });
  }

  function onGoogleSignIn(resp) {
    ID_TOKEN = resp.credential;
    api('getCurrentUser').then(function(user) {
      CURRENT = user;
      PROFILE_OK = !!user.profileComplete;
      document.getElementById('view-signin').style.display = 'none';
      document.getElementById('view-app').style.display = 'block';
      document.getElementById('userbox').innerHTML =
        '<span>' + esc(user.name || user.email) + '</span>' +
        '<button class="logout" onclick="logout()">登出</button>';
      if (user.isAdmin) document.getElementById('tab-admin').style.display = 'inline-block';
      applyProfileGate();
    }).catch(function(e) {
      document.getElementById('signin-err').textContent = '登入失敗：' + (e.message || e);
    });
  }

  // 個人資料未填完 → 鎖住其他分頁，強制停在個人資料
  function applyProfileGate() {
    var lock = !PROFILE_OK;
    document.getElementById('tab-courses').disabled = lock;
    document.getElementById('tab-my').disabled = lock;
    document.getElementById('tab-admin').disabled = lock;
    if (lock) switchTab('profile');
    else switchTab('courses');
  }

  function logout() {
    if (window.google && google.accounts && google.accounts.id) {
      google.accounts.id.disableAutoSelect();
    }
    ID_TOKEN = null; CURRENT = null; PROFILE_OK = false;
    CACHE = { openCourses: null, profile: null, courses: null };
    document.getElementById('view-app').style.display = 'none';
    document.getElementById('view-signin').style.display = 'block';
    document.getElementById('signin-err').textContent = '';
    document.getElementById('userbox').innerHTML = '';
    document.getElementById('tab-admin').style.display = 'none';
  }

  window.onload = function() {
    var t = setInterval(function() {
      if (window.google && google.accounts && google.accounts.id) {
        clearInterval(t);
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleSignIn });
        google.accounts.id.renderButton(document.getElementById('gbtn'),
          { theme: 'filled_blue', size: 'large', text: 'signin_with', locale: 'zh_TW' });
      }
    }, 200);
  };

  document.querySelectorAll('.tab').forEach(function(t) {
    t.addEventListener('click', function() { if (!t.disabled) switchTab(t.dataset.tab); });
  });
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    // 後台資料表多，放寬版面；其他頁維持原寬
    document.querySelector('main').style.maxWidth = (name === 'admin') ? '1200px' : '';
    if      (name === 'courses') renderCourses();
    else if (name === 'my')      renderMy();
    else if (name === 'profile') renderProfile();
    else if (name === 'admin')   renderAdmin();
  }

  var panel = function() { return document.getElementById('panel'); };
  function loading() { panel().innerHTML = '<div class="center">載入中…</div>'; }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
    });
  }

  // ===== 課程報名 =====
  function renderCourses() {
    // 有快取就先秒顯示，再背景更新；沒有才顯示「載入中」
    if (CACHE.openCourses) paintCourses(CACHE.openCourses);
    else loading();
    api('getOpenCourses').then(function(list) {
      CACHE.openCourses = list;
      paintCourses(list);
    }).catch(function(e) { if (!CACHE.openCourses) showErr(e); });
  }
  function paintCourses(list) {
    var head = '<p class="meta" style="margin-bottom:10px;">以下是開放給「<strong>' +
      esc(list.length ? (list[0].myIdentity || '你的領域') : (CURRENT && CURRENT.identity || '你的領域')) +
      '</strong>」的課程。</p>';
    if (!list.length) { panel().innerHTML = '<div class="center">目前沒有開放給你報名的課程</div>'; return; }
    panel().innerHTML = head + list.map(function(c) {
      var badge = c.audience === '社政' ? '<span class="badge-sw">限社政</span>'
                : c.audience === '教育' ? '<span class="badge-te">限教育</span>' : '';
      var quota;
      if (c.swQuota > 0 || c.teQuota > 0) {
        quota = (c.swQuota > 0 ? '社政 ' + c.swCount + '/' + c.swQuota + ' 人　' : '') +
                (c.teQuota > 0 ? '教育 ' + c.teCount + '/' + c.teQuota + ' 人' : '');
      } else {
        quota = '已報名 ' + c.total + (c.capacity > 0 ? ' / ' + c.capacity : '') + ' 人';
      }
      var sessionLine = c.session ? '場次：' + esc(c.session) + '<br>' : ''; // 場次空白不顯示
      return '<div class="card"><h3>' + esc(c.name) + badge + '</h3>' +
        '<div class="meta">' + sessionLine + '時間：' + esc(c.datetime) +
        '<br>地點：' + esc(c.place) + '<br>名額：' + quota + '</div>' +
        '<p><button class="action" onclick="confirmRegister(\'' + esc(c.courseId) + '\',\'' + esc(c.name) + '\')">我要報名</button></p></div>';
    }).join('');
  }

  // 一鍵報名：身份從個人資料自動帶入，只需確認
  function confirmRegister(courseId, courseName) {
    document.getElementById('modal-title').textContent = '確認報名';
    document.getElementById('modal-body').innerHTML =
      '<p style="margin:8px 0;">確定報名「<strong>' + esc(courseName) + '</strong>」？</p>' +
      '<p class="hint">系統會以你個人資料的服務領域送出。</p>' +
      '<p class="hint err" id="m-err"></p>' +
      '<div style="text-align:right;margin-top:8px;">' +
      '<button class="ghost" onclick="closeModal()">取消</button> ' +
      '<button class="action" id="m-ok">確認報名</button></div>';
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('m-ok').onclick = function() {
      this.disabled = true; this.textContent = '送出中…';
      api('registerCourse', { courseId: courseId }).then(function(res) {
        closeModal();
        CACHE.openCourses = null; // 名額/狀態已變，下次重新抓
        var st = (res && res.status) || '待審核';
        var msg = st === '錄取' ? '報名成功，已直接錄取！'
                : st === '候補' ? '報名成功，目前名額已滿，列為候補。'
                : '報名成功！因你有記點紀錄，需人工審核。';
        alert(msg + '可到「我的報名」查看狀態。');
        switchTab('my');
      }).catch(function(e) {
        document.getElementById('m-err').textContent = e.message || e;
        var b = document.getElementById('m-ok'); b.disabled = false; b.textContent = '確認報名';
      });
    };
  }
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modal').querySelector('.modal').style.width = ''; // 還原寬度
  }

  // ===== 我的報名 =====
  function renderMy() {
    loading();
    api('getMyRegistrations').then(function(list) {
      if (!list.length) { panel().innerHTML = '<div class="center">你還沒有任何報名紀錄</div>'; return; }
      panel().innerHTML = list.map(function(r) {
        var cancelBtn = (r.status === '待審核' || r.status === '候補')
          ? '<button class="ghost sm" onclick="cancelReg(\'' + esc(r.regId) + '\')">取消報名</button>' : '';
        return '<div class="card"><h3>' + esc(r.courseName) + '</h3>' +
          '<div class="meta">時間：' + esc(r.datetime) + '　服務領域：' + esc(r.identity || '—') +
          '<br>報名時間：' + esc(r.regTime) + '</div>' +
          '<p><span class="status s-' + esc(r.status) + '">' + esc(r.status) + '</span> ' + cancelBtn + '</p></div>';
      }).join('');
    }).catch(showErr);
  }
  function cancelReg(regId) {
    if (!confirm('確定取消這筆報名？')) return;
    api('cancelMyRegistration', { regId: regId }).then(function() { renderMy(); }).catch(showErr);
  }

  // ===== 個人資料 =====
  function renderProfile() {
    loading();
    // 管理帳號不需要填個人資料
    if (CURRENT && CURRENT.isAdmin) {
      panel().innerHTML =
        '<div class="card" style="text-align:center;padding:32px;">' +
        '<p style="font-size:18px;color:var(--brand-dark);font-weight:bold;">⚙ 管理帳號</p>' +
        '<p class="meta" style="margin-top:8px;">登入信箱：<strong>' + esc(CURRENT.email) + '</strong></p>' +
        '<p class="hint">管理帳號不需要填寫個人資料。<br>請使用上方「後台」分頁管理課程與學員。</p>' +
        '</div>';
      return;
    }
    // 個資是表單，背景重繪會蓋掉使用者輸入；故有快取就直接畫、不重抓
    if (CACHE.profile) { paintProfile(CACHE.profile); return; }
    api('getMyProfile').then(function(p) {
      CACHE.profile = p;
      paintProfile(p);
    }).catch(showErr);
  }

  // 預設顯示唯讀預覽；資料未填完則直接進編輯
  function paintProfile(p) {
    if (!PROFILE_OK) { editProfile(p); return; }
    var social = p.identity === '社政'
      ? prow('社工師繼續教育積分', p.creditNeeded) + prow('主責項目', p.mainTask)
      : '';
    panel().innerHTML =
      '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
      '<h3 style="margin:0;">個人基本資料</h3>' +
      '<button class="ghost" onclick="editProfileFromCache()">編輯</button></div>' +
      '<p class="meta" style="margin:8px 0;">登入帳號：<strong>' + esc(p.email) + '</strong>　累計記點：<strong>' + p.points + ' 點</strong></p>' +
      '<table class="form-table">' +
      prow('姓名', p.name) + prow('服務領域', p.identity) + prow('生理性別', p.gender) +
      prow('身份證字號', p.idNumber) + prow('聯絡信箱', p.contactEmail) +
      prow('手機電話', p.mobile) + prow('辦公室電話', p.officePhone) +
      prow('餐食選擇', p.meal) + prow('單位名稱', p.org) + prow('職稱', p.title) +
      social +
      '</table></div>';
  }
  function prow(label, val) {
    return '<tr><td>' + esc(label) + '</td><td style="padding:5px 0;"><strong>' + (val ? esc(val) : '—') + '</strong></td></tr>';
  }
  function editProfileFromCache() { editProfile(CACHE.profile || {}); }

  // 編輯模式表單
  function editProfile(p) {
    p = p || {};
    var gate = !PROFILE_OK
      ? '<div class="notice">首次使用請先完整填寫個人資料（全部必填），儲存後才能報名課程。</div>'
      : '';
    var mainTaskOpts = ['','一般性社工','保護性社工-家庭暴力防治','保護性社工-兒少保護','保護性社工-性侵害防治'];
    panel().innerHTML = gate +
      '<div class="card"><h3>編輯個人基本資料</h3>' +
      '<p class="meta">登入帳號：<strong>' + esc(p.email || (CURRENT && CURRENT.email) || '') + '</strong>（不可更改）</p>' +
      '<table class="form-table">' +
      frow('姓名 <span class="req">*</span>', '<input id="p-name" class="finput" value="' + esc(p.name) + '" maxlength="50">') +
      frow('服務領域 <span class="req">*</span>', '<select id="p-identity" class="finput" onchange="toggleSocialFields()">' +
        ['','社政','教育'].map(function(o){ return '<option value="'+esc(o)+'"'+(p.identity===o?' selected':'')+'>'+esc(o||'請選擇')+'</option>'; }).join('') + '</select>') +
      frow('生理性別 <span class="req">*</span>', fsel('p-gender', ['','男','女','其他/不透漏'], p.gender)) +
      frow('身份證字號 <span class="req">*</span>', '<input id="p-idNumber" class="finput" value="' + esc(p.idNumber) + '" maxlength="20" placeholder="A123456789">') +
      frow('聯絡信箱 <span class="req">*</span>', '<input id="p-contactEmail" class="finput" type="email" value="' + esc(p.contactEmail) + '" maxlength="80" placeholder="常用信箱，可與登入帳號不同">') +
      frow('手機電話 <span class="req">*</span>', '<input id="p-mobile" class="finput" value="' + esc(p.mobile) + '" maxlength="30" placeholder="0912345678">') +
      frow('辦公室電話 <span class="req">*</span>', '<input id="p-officePhone" class="finput" value="' + esc(p.officePhone) + '" maxlength="30" placeholder="03-1234567">') +
      frow('餐食選擇 <span class="req">*</span>', fsel('p-meal', ['','葷食','素食'], p.meal)) +
      frow('單位名稱 <span class="req">*</span>', '<input id="p-org" class="finput" value="' + esc(p.org) + '" maxlength="100">') +
      frow('職稱 <span class="req">*</span>', '<input id="p-title" class="finput" value="' + esc(p.title) + '" maxlength="50">') +
      '</table>' +
      '<div id="p-social-fields" style="display:none;"><table class="form-table">' +
      frow('社工師繼續教育積分 <span class="req">*</span>', fsel('p-creditNeeded', ['','需要','不需要'], p.creditNeeded)) +
      frow('主責項目 <span class="req">*</span>', fsel('p-mainTask', mainTaskOpts, p.mainTask)) +
      '</table></div>' +
      '<p style="margin-top:12px;"><button class="action" id="p-save" onclick="saveProfile()">儲存資料</button>' +
      (PROFILE_OK ? ' <button class="ghost" onclick="renderProfile()">取消</button>' : '') +
      '　<span id="p-msg" class="hint"></span></p>' +
      '<p class="hint" style="color:#bbb;">資料儲存於主辦單位 Google Sheets，僅供課程管理使用。</p>' +
      '</div>';
    toggleSocialFields();
  }
  // 服務領域=社政才顯示積分與主責項目
  function toggleSocialFields() {
    var box = document.getElementById('p-social-fields');
    if (box) box.style.display = (document.getElementById('p-identity').value === '社政') ? '' : 'none';
  }
  function frow(label, input) { return '<tr><td>' + label + '</td><td style="padding:4px 0;">' + input + '</td></tr>'; }
  function fsel(id, opts, cur) {
    return '<select id="' + id + '" class="finput">' +
      opts.map(function(o) {
        return '<option value="' + esc(o) + '"' + (cur === o ? ' selected' : '') + '>' + esc(o || '請選擇') + '</option>';
      }).join('') + '</select>';
  }
  function saveProfile() {
    var isSocial = document.getElementById('p-identity').value === '社政';
    var v = {
      name:         document.getElementById('p-name').value.trim(),
      identity:     document.getElementById('p-identity').value,
      gender:       document.getElementById('p-gender').value,
      idNumber:     document.getElementById('p-idNumber').value.trim(),

    btn.disabled = true; btn.textContent = '儲存中…';

      };

      document.getElementById('tab-my').disabled = false;

    }).catch(function(e) {
      msg.className = 'hint err'; msg.textContent = e.message || e;

  function setAdminView(view) {
    ADMIN_VIEW = view;

    var map = { courses:'courses', regs:'regs', attendance:'att', members:'members' };
    for (var v in map) {

  function loadAdminView() {
    if      (ADMIN_VIEW === 'courses')    loadAdminCourses();
    else if (ADMIN_VIEW === 'regs')       loadAdminRegs();
    else if (ADMIN_VIEW === 'attendance') loadAdminAttendance();

  function loadAdminAttendance() {
    var ct = document.getElementById('adm-content');
    if (!ADMIN_COURSE) { ct.innerHTML = '<div class="center">請先選擇課程</div>'; return; }
    ct.innerHTML = '<div class="center">載入中…</div>';
    Promise.all([
      api('adminGetRegistrations', { courseId: ADMIN_COURSE }),
      api('getAttendance', { courseId: ADMIN_COURSE })
    ]).then(function(res) {
      var list = res[0], attMap = res[1];
      var active = list.filter(function(r) { return r.status === '錄取'; });
      if (!active.length) { ct.innerHTML = '<div class="center">此課程目前沒有「錄取」狀態的學員</div>'; return; }
      var ATT_OPTS = ['出席','事前請假','臨時請假','缺席'];
      var POINT_LABEL = { '出席':'0點','事前請假':'0點','臨時請假':'+1點','缺席':'+2點' };
      var rows = active.map(function(r) {
        var cur = attMap[(r.email || '').toLowerCase()] || '出席';
        var sel = ATT_OPTS.map(function(o) {
          return '<option value="' + o + '"' + (cur === o ? ' selected' : '') + '>' + o + '（' + POINT_LABEL[o] + '）</option>';
        }).join('');
        return '<tr data-regid="' + esc(r.regId) + '" data-email="' + esc(r.email) + '" data-courseid="' + esc(ADMIN_COURSE) + '">' +
          '<td>' + esc(r.name) + '</td><td>' + esc(r.email) + '</td><td>' + esc(r.identity) + '</td>' +
          '<td><select class="att-sel" style="padding:5px;border:1px solid #ccc;border-radius:6px;">' + sel + '</select></td></tr>';
      }).join('');
      ct.innerHTML =
        '<p class="hint">記點規則：臨時請假（課前3日內）+1點，缺席+2點，出席/事前請假不計點。重複送出會以最新紀錄覆蓋（差值補正）。</p>' +
        '<table><tr><th>姓名</th><th>Email</th><th>領域</th><th>出席狀態</th></tr>' + rows + '</table>' +
        '<p style="margin-top:14px;"><button class="action" id="att-btn" onclick="submitAttendance()">送出出勤紀錄</button>　<span id="att-msg" class="hint"></span></p>';
    }).catch(function(e) { ct.innerHTML = '<div class="center err">錯誤：' + esc(e.message) + '</div>'; });
  }
  function submitAttendance() {
    var rows = document.querySelectorAll('#adm-content table tr[data-regid]');
    var records = [];
    rows.forEach(function(tr) {
      records.push({
        regId: tr.dataset.regid, email: tr.dataset.email,
        courseId: tr.dataset.courseid, attendStatus: tr.querySelector('.att-sel').value
      });
    });
    var btn = document.getElementById('att-btn'), msg = document.getElementById('att-msg');
    btn.disabled = true; btn.textContent = '送出中…';
    api('recordAttendance', { records: records }).then(function(result) {
      msg.className = 'hint ok'; msg.textContent = '已登記 ' + result.recorded + ' 筆！';
      btn.disabled = false; btn.textContent = '送出出勤紀錄';
    }).catch(function(e) {
      msg.className = 'hint err'; msg.textContent = e.message || e;
      btn.disabled = false; btn.textContent = '送出出勤紀錄';

        '<td>' + esc(c.audience) + '</td><td>' + quota + '</td>' +
        '<td>' + esc(c.regClose) + '</td><td>' + badge + '</td>' +

    var c = COURSES_CACHE[idx];

    var next = c.status === '開放' ? '關閉' : '開放';
    api('adminUpdateCourse', {
      courseId: c.courseId, name: c.name, session: c.session, datetime: c.datetime,
      place: c.place, capacity: c.capacity, audience: c.audience,
      swQuota: c.swQuota, teQuota: c.teQuota, regOpen: c.regOpen, regClose: c.regClose,
      status: next
    }).then(function() { CACHE.courses = null; loadAdminCourses(); })
      .catch(function(e) { alert('錯誤：' + (e.message || e)); });
  }

  function deleteCourse(idx) {
    var c = COURSES_CACHE[idx];
    if (!c) return;
    if (!confirm('確定刪除課程「' + c.name + '」？此動作無法復原。')) return;
    api('adminDeleteCourse', { courseId: c.courseId })
      .then(function() { CACHE.courses = null; loadAdminCourses(); })
      .catch(function(e) { alert(e.message || e); });

  // 填入開課日期時，自動計算報名截止（課前10天）
  function onCourseDateChange() {
    var v = document.getElementById('c-date').value;
    if (!v) return;
    var d = new Date(v); d.setDate(d.getDate() - 10);
    var pad = function(n) { return ('0' + n).slice(-2); };
    document.getElementById('c-regClose').value =
      d.getFullYear() + '/' + pad(d.getMonth() + 1) + '/' + pad(d.getDate());
  }

  // 從 datetime 字串解析日期（給 date input，格式 yyyy-MM-dd）
  function extractDate_(dt) {
    if (!dt) return '';
    var m = String(dt).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (!m) return '';
    return m[1] + '-' + ('0' + m[2]).slice(-2) + '-' + ('0' + m[3]).slice(-2);
  }
  // 從 datetime 字串解析時間部分（空白後的內容）
  function extractTime_(dt) {
    if (!dt) return '';
    var idx = String(dt).indexOf(' ');
    return idx >= 0 ? dt.slice(idx + 1) : '';
  }

      frow('身份證字號', '<input id="e-idNumber" class="finput" value="' + esc(m.idNumber) + '" maxlength="20">') +
      frow('聯絡信箱', '<input id="e-contactEmail" class="finput" value="' + esc(m.contactEmail) + '" maxlength="80">') +
      frow('手機電話', '<input id="e-mobile" class="finput" value="' + esc(m.mobile) + '" maxlength="30">') +
      frow('辦公室電話', '<input id="e-officePhone" class="finput" value="' + esc(m.officePhone) + '" maxlength="30">') +
      frow('餐食選擇', fsel('e-meal', ['','葷食','素食'], m.meal)) +
      frow('單位名稱', '<input id="e-org" class="finput" value="' + esc(m.org) + '" maxlength="100">') +
      frow('職稱', '<input id="e-title" class="finput" value="' + esc(m.title) + '" maxlength="50">') +
      '</table>' +
      '<div id="e-social-fields" style="display:none;"><table class="form-table">' +
      frow('社工師繼續教育積分', fsel('e-creditNeeded', ['','需要','不需要'], m.creditNeeded)) +
      frow('主責項目', fsel('e-mainTask', ['','一般性社工','保護性社工-家庭暴力防治','保護性社工-兒少保護','保護性社工-性侵害防治'], m.mainTask)) +
      '</table></div>' +
      '<table class="form-table">' +
      frow('累計記點', '<input id="e-points" class="finput" type="number" min="0" value="' + esc(m.points) + '">') +
      '</table>' +
      '<p class="hint err" id="e-err"></p>' +
      '<div style="text-align:right;margin-top:10px;">' +
      '<button class="ghost" onclick="closeModal()">取消</button> ' +
      '<button class="action" id="e-ok">儲存</button></div>';
    document.getElementById('modal').querySelector('.modal').style.width = '420px';
    document.getElementById('modal').style.display = 'flex';
    toggleEditSocial();
    document.getElementById('e-ok').onclick = function() {
      var isSocial = document.getElementById('e-identity').value === '社政';
      var btn = this; btn.disabled = true; btn.textContent = '儲存中…';
      api('adminUpdateMember', {
        email:        m.email,
        name:         document.getElementById('e-name').value.trim(),
        identity:     document.getElementById('e-identity').value,
        gender:       document.getElementById('e-gender').value,
        idNumber:     document.getElementById('e-idNumber').value.trim(),
        contactEmail: document.getElementById('e-contactEmail').value.trim(),
        mobile:       document.getElementById('e-mobile').value.trim(),
        officePhone:  document.getElementById('e-officePhone').value.trim(),
        meal:         document.getElementById('e-meal').value,
        org:          document.getElementById('e-org').value.trim(),
        title:        document.getElementById('e-title').value.trim(),
        creditNeeded: isSocial ? document.getElementById('e-creditNeeded').value : '',
        mainTask:     isSocial ? document.getElementById('e-mainTask').value : '',
        points:       document.getElementById('e-points').value
      }).then(function() {
        closeModal(); loadAdminMembers();
      }).catch(function(e) {
        document.getElementById('e-err').textContent = e.message || e;
        btn.disabled = false; btn.textContent = '儲存';
      });
    };
  }
  function toggleEditSocial() {
    var box = document.getElementById('e-social-fields');
    if (box) box.style.display = (document.getElementById('e-identity').value === '社政') ? '' : 'none';
  }

  function showErr(e) { panel().innerHTML = '<div class="center err">發生錯誤：' + esc(e.message || e) + '</div>'; }
</script>
</body>
</html>
