<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教育訓練報名平台</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --brand:#E8732B; --brand-dark:#cf6420; --bg:#fff7f1; --line:#f0d9c8; --text:#333; }
    * { box-sizing:border-box; }
    body { font-family:"Microsoft JhengHei","Segoe UI",sans-serif; margin:0; background:var(--bg); color:var(--text); }
    header { background:var(--brand); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    header h1 { font-size:18px; margin:0; }
    .userbox { font-size:14px; }
    main { max-width:960px; margin:0 auto; padding:20px; }
    .tabs { display:flex; gap:8px; border-bottom:2px solid var(--line); margin-bottom:16px; flex-wrap:wrap; }
    .tab { padding:10px 16px; cursor:pointer; border:none; background:none; font-size:15px; color:#888; border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab.active { color:var(--brand-dark); border-bottom-color:var(--brand); font-weight:bold; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:12px; }
    .card h3 { margin:0 0 6px; color:var(--brand-dark); }
    .meta { color:#777; font-size:14px; line-height:1.7; }
    button.action { background:var(--brand); color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; font-size:14px; }
    button.action:hover { background:var(--brand-dark); }
    button.ghost { background:#fff; color:var(--brand-dark); border:1px solid var(--brand); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
    button.sm { padding:4px 10px; font-size:12px; border-radius:6px; }
    .status { display:inline-block; padding:2px 10px; border-radius:12px; font-size:13px; }
    .s-待審核 { background:#fff3e0; color:#b26a00; }
    .s-錄取   { background:#e6f4ea; color:#1e7e34; }
    .s-候補   { background:#e8eaf6; color:#3f51b5; }
    .s-婉拒, .s-取消 { background:#f1f1f1; color:#888; }
    .badge-sw { background:#e3f2fd; color:#1565c0; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:6px; }
    .badge-te { background:#f3e5f5; color:#6a1b9a; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:6px; }
    table { width:100%; border-collapse:collapse; background:#fff; font-size:14px; }
    th, td { border:1px solid var(--line); padding:7px 9px; text-align:left; }
    th { background:#fbe7d6; }
    .center { text-align:center; padding:40px 0; color:#999; }
    .signin-wrap { text-align:center; padding:60px 0; }
    #gbtn { display:inline-block; }
    .hint { color:#999; font-size:13px; margin-top:6px; }
    .err { color:#c0392b !important; }
    .ok  { color:#1e7e34 !important; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:100; }
    .modal { background:#fff; border-radius:10px; padding:24px; width:340px; max-width:90%; }
    .modal select { width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:6px; font-size:15px; }
    /* 個人資料表單 */
    .form-table { width:100%; border-collapse:collapse; }
    .form-table td { border:none; padding:5px 0; vertical-align:middle; }
    .form-table td:first-child { color:#555; white-space:nowrap; padding-right:14px; font-size:14px; min-width:90px; }
    .finput { width:100%; padding:7px 9px; border:1px solid #ccc; border-radius:6px; font-size:14px; font-family:inherit; }
    .finput:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 2px rgba(232,115,43,.15); }
    select.finput { background:#fff; cursor:pointer; }
    .req { color:#c0392b; }
    /* 管理分頁 */
    .subtabs { display:flex; gap:6px; margin-bottom:12px; }
    .subtab { padding:7px 14px; border:1px solid var(--line); border-radius:8px; cursor:pointer; font-size:14px; background:#fff; color:#666; }
    .subtab.active { background:var(--brand); color:#fff; border-color:var(--brand); }
  </style>
</head>
<body>
  <header>
    <h1>教育訓練報名平台</h1>
    <div class="userbox" id="userbox"></div>
  </header>
  <main>
    <div id="view-signin" class="signin-wrap">
      <h2>請用 Google 帳號登入後報名</h2>
      <div id="gbtn"></div>
      <p class="hint">登入只做身分驗證，用來辨識你的報名與紀錄。</p>
      <p class="hint err" id="signin-err"></p>
    </div>
    <div id="view-app" style="display:none;">
      <div class="tabs">
        <button class="tab active" data-tab="courses">課程報名</button>
        <button class="tab" data-tab="my">我的報名</button>
        <button class="tab" data-tab="profile">個人資料</button>
        <button class="tab" data-tab="admin" id="tab-admin" style="display:none;">後台</button>
      </div>
      <div id="panel"></div>
    </div>
  </main>
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3 id="modal-title">確認報名</h3>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
  var GAS_URL   = 'https://script.google.com/macros/s/AKfycbw0cb9KW6DcA0HprkxQHtpqtRQzXVtjViNxHUAfgOcjD2kmjyhiETL2LX_PqipeSHEt7g/exec';
  var CLIENT_ID = '827349215437-1najkao8u6kcitn9rr765bu4eqhks4h3.apps.googleusercontent.com';

  var ID_TOKEN = null;
  var CURRENT  = null;
  var ADMIN_COURSE = '';
  var ADMIN_VIEW   = 'regs';

  function api(action, payload) {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: action, idToken: ID_TOKEN, payload: payload || {} })
    }).then(function(r) { return r.json(); })
      .then(function(res) { if (!res.ok) throw new Error(res.error || '伺服器錯誤'); return res.data; });
  }

  function onGoogleSignIn(resp) {
    ID_TOKEN = resp.credential;
    api('getCurrentUser').then(function(user) {
      CURRENT = user;
      document.getElementById('view-signin').style.display = 'none';
      document.getElementById('view-app').style.display = 'block';
      document.getElementById('userbox').textContent = user.name + '（' + user.email + '）';
      if (user.isAdmin) document.getElementById('tab-admin').style.display = 'inline-block';
      switchTab('courses');
    }).catch(function(e) {
      document.getElementById('signin-err').textContent = '登入失敗：' + (e.message || e);
    });
  }

  window.onload = function() {
    var t = setInterval(function() {
      if (window.google && google.accounts && google.accounts.id) {
        clearInterval(t);
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleSignIn });
        google.accounts.id.renderButton(document.getElementById('gbtn'),
          { theme: 'filled_blue', size: 'large', text: 'signin_with', locale: 'zh_TW' });
      }
    }, 200);
  };

  document.querySelectorAll('.tab').forEach(function(t) {
    t.addEventListener('click', function() { switchTab(t.dataset.tab); });
  });
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    if      (name === 'courses') renderCourses();
    else if (name === 'my')      renderMy();
    else if (name === 'profile') renderProfile();
    else if (name === 'admin')   renderAdmin();
  }

  var panel = function() { return document.getElementById('panel'); };
  function loading() { panel().innerHTML = '<div class="center">載入中…</div>'; }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
    });
  }

  // ===== 課程報名 =====
  function renderCourses() {
    loading();
    api('getOpenCourses').then(function(list) {
      if (!list.length) { panel().innerHTML = '<div class="center">目前沒有開放報名的課程</div>'; return; }
      panel().innerHTML = list.map(function(c) {
        // 對象 badge
        var badge = c.audience === '社工' ? '<span class="badge-sw">社工</span>'
                  : c.audience === '老師' ? '<span class="badge-te">老師</span>' : '';
        // 名額顯示
        var quota;
        if (c.swQuota > 0 || c.teQuota > 0) {
          quota = (c.swQuota > 0 ? '社工 ' + c.swCount + '/' + c.swQuota + ' 人　' : '') +
                  (c.teQuota > 0 ? '老師 ' + c.teCount + '/' + c.teQuota + ' 人' : '');
        } else {
          quota = '已報名 ' + c.total + (c.capacity > 0 ? ' / ' + c.capacity : '') + ' 人';
        }
        return '<div class="card"><h3>' + esc(c.name) + badge + '</h3>' +
          '<div class="meta">場次：' + esc(c.session) + '<br>時間：' + esc(c.datetime) +
          '<br>地點：' + esc(c.place) + '<br>名額：' + quota + '</div>' +
          '<p><button class="action" onclick="openRegister(\'' + esc(c.courseId) + '\',\'' +
          esc(c.name) + '\',\'' + esc(c.audience) + '\')">我要報名</button></p></div>';
      }).join('');
    }).catch(showErr);
  }

  function openRegister(courseId, courseName, audience) {
    var opts = '';
    if (audience === '全部' || audience === '社工') opts += '<option value="社工">社工</option>';
    if (audience === '全部' || audience === '老師') opts += '<option value="老師">老師</option>';
    document.getElementById('modal-title').textContent = '報名：' + courseName;
    document.getElementById('modal-body').innerHTML =
      '<p style="margin:8px 0 4px;">請選擇你的身份：</p>' +
      '<select id="m-identity">' + opts + '</select>' +
      '<p class="hint err" id="m-err"></p>' +
      '<div style="text-align:right;margin-top:12px;">' +
      '<button class="ghost" onclick="closeModal()">取消</button> ' +
      '<button class="action" id="m-ok">確認報名</button></div>';
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('m-ok').onclick = function() {
      var identity = document.getElementById('m-identity').value;
      this.disabled = true; this.textContent = '送出中…';
      api('registerCourse', { courseId: courseId, identity: identity }).then(function() {
        closeModal();
        alert('報名成功！狀態為「待審核」，可到「我的報名」查看。');
        switchTab('my');
      }).catch(function(e) {
        document.getElementById('m-err').textContent = e.message || e;
        var b = document.getElementById('m-ok'); b.disabled = false; b.textContent = '確認報名';
      });
    };
  }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  // ===== 我的報名 =====
  function renderMy() {
    loading();
    api('getMyRegistrations').then(function(list) {
      if (!list.length) { panel().innerHTML = '<div class="center">你還沒有任何報名紀錄</div>'; return; }
      panel().innerHTML = list.map(function(r) {
        var cancelBtn = (r.status === '待審核' || r.status === '候補')
          ? '<button class="ghost sm" onclick="cancelReg(\'' + esc(r.regId) + '\')">取消報名</button>' : '';
        return '<div class="card"><h3>' + esc(r.courseName) + '</h3>' +
          '<div class="meta">時間：' + esc(r.datetime) + '　身份別：' + esc(r.identity || '—') +
          '<br>報名時間：' + esc(r.regTime) + '</div>' +
          '<p><span class="status s-' + esc(r.status) + '">' + esc(r.status) + '</span> ' + cancelBtn + '</p></div>';
      }).join('');
    }).catch(showErr);
  }
  function cancelReg(regId) {
    if (!confirm('確定取消這筆報名？')) return;
    api('cancelMyRegistration', { regId: regId }).then(function() { renderMy(); }).catch(showErr);
  }

  // ===== 個人資料 =====
  function renderProfile() {
    loading();
    api('getMyProfile').then(function(p) {
      panel().innerHTML =
        '<div class="card"><h3>個人基本資料</h3>' +
        '<p class="meta">登入帳號：<strong>' + esc(p.email) + '</strong>　累計記點：<strong>' + p.points + ' 點</strong></p>' +
        '<table class="form-table">' +
        frow('姓名 <span class="req">*</span>',
          '<input id="p-name" class="finput" value="' + esc(p.name) + '" maxlength="50">') +
        frow('生理性別 <span class="req">*</span>', fsel('p-gender', ['','男','女','其他/不透漏'], p.gender)) +
        frow('身份證字號', '<input id="p-idNumber" class="finput" value="' + esc(p.idNumber) + '" maxlength="20" placeholder="A123456789">') +
        frow('手機電話 <span class="req">*</span>', '<input id="p-mobile" class="finput" value="' + esc(p.mobile) + '" maxlength="30" placeholder="0912345678">') +
        frow('辦公室電話', '<input id="p-officePhone" class="finput" value="' + esc(p.officePhone) + '" maxlength="30">') +
        frow('餐食選擇', fsel('p-meal', ['','葷食','素食','清真','不需要'], p.meal)) +
        frow('單位名稱 <span class="req">*</span>', '<input id="p-org" class="finput" value="' + esc(p.org) + '" maxlength="100">') +
        frow('職稱 <span class="req">*</span>', '<input id="p-title" class="finput" value="' + esc(p.title) + '" maxlength="50">') +
        frow('積分需求', fsel('p-creditNeeded', ['','需要','不需要'], p.creditNeeded)) +
        frow('主責項目', '<input id="p-mainTask" class="finput" value="' + esc(p.mainTask) + '" maxlength="200" placeholder="例如：家防、兒少保護">') +
        '</table>' +
        '<p style="margin-top:12px;">' +
        '<button class="action" id="p-save" onclick="saveProfile()">儲存資料</button>' +
        '　<span id="p-msg" class="hint"></span></p>' +
        '<p class="hint" style="color:#bbb;">資料儲存於主辦單位 Google Sheets，僅供課程管理使用。</p>' +
        '</div>';
    }).catch(showErr);
  }
  function frow(label, input) {
    return '<tr><td>' + label + '</td><td style="padding:4px 0;">' + input + '</td></tr>';
  }
  function fsel(id, opts, cur) {
    return '<select id="' + id + '" class="finput">' +
      opts.map(function(o) {
        return '<option value="' + esc(o) + '"' + (cur === o ? ' selected' : '') + '>' + esc(o || '請選擇') + '</option>';
      }).join('') + '</select>';
  }
  function saveProfile() {
    var name = document.getElementById('p-name').value.trim();
    var gender = document.getElementById('p-gender').value;
    var mobile = document.getElementById('p-mobile').value.trim();
    var org    = document.getElementById('p-org').value.trim();
    var title  = document.getElementById('p-title').value.trim();
    var msg    = document.getElementById('p-msg');
    msg.className = 'hint err'; msg.textContent = '';
    if (!name)   { msg.textContent = '姓名為必填'; return; }
    if (!gender) { msg.textContent = '生理性別為必填'; return; }
    if (!mobile) { msg.textContent = '手機電話為必填'; return; }
    if (!org)    { msg.textContent = '單位名稱為必填'; return; }
    if (!title)  { msg.textContent = '職稱為必填'; return; }
    var btn = document.getElementById('p-save');
    btn.disabled = true; btn.textContent = '儲存中…';
    api('updateMyProfile', {
      name: name, gender: gender,
      idNumber:     document.getElementById('p-idNumber').value.trim(),
      mobile:       mobile,
      officePhone:  document.getElementById('p-officePhone').value.trim(),
      meal:         document.getElementById('p-meal').value,
      org: org, title: title,
      creditNeeded: document.getElementById('p-creditNeeded').value,
      mainTask:     document.getElementById('p-mainTask').value.trim()
    }).then(function() {
      msg.className = 'hint ok'; msg.textContent = '已儲存！';
      btn.disabled = false; btn.textContent = '儲存資料';
    }).catch(function(e) {
      msg.className = 'hint err'; msg.textContent = e.message || e;
      btn.disabled = false; btn.textContent = '儲存資料';
    });
  }

  // ===== 後台 =====
  function renderAdmin() {
    loading();
    api('adminGetCourses').then(function(courses) {
      var opts = '<option value="">（全部課程）</option>' + courses.map(function(c) {
        return '<option value="' + esc(c.courseId) + '">' + esc(c.name) + '（' + esc(c.status) + '）</option>';
      }).join('');
      panel().innerHTML =
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">' +
        '<label style="font-size:14px;">課程：<select id="adm-course" onchange="onAdminCourseChange()" style="padding:6px;border:1px solid #ccc;border-radius:6px;">' + opts + '</select></label>' +
        '</div>' +
        '<div class="subtabs">' +
        '<button class="subtab active" id="btn-regs" onclick="setAdminView(\'regs\')">報名名單</button>' +
        '<button class="subtab" id="btn-att" onclick="setAdminView(\'attendance\')">登記出勤</button>' +
        '</div>' +
        '<div id="adm-content"></div>';
      ADMIN_COURSE = '';
      ADMIN_VIEW = 'regs';
      loadAdminView();
    }).catch(showErr);
  }
  function onAdminCourseChange() {
    ADMIN_COURSE = document.getElementById('adm-course').value;
    loadAdminView();
  }
  function setAdminView(view) {
    ADMIN_VIEW = view;
    document.getElementById('btn-regs').classList.toggle('active', view === 'regs');
    document.getElementById('btn-att').classList.toggle('active', view === 'attendance');
    loadAdminView();
  }
  function loadAdminView() {
    if (ADMIN_VIEW === 'regs') loadAdminRegs();
    else loadAdminAttendance();
  }

  function loadAdminRegs() {
    var ct = document.getElementById('adm-content');
    ct.innerHTML = '<div class="center">載入中…</div>';
    api('adminGetRegistrations', { courseId: ADMIN_COURSE }).then(function(list) {
      if (!list.length) { ct.innerHTML = '<div class="center">沒有報名資料</div>'; return; }
      var rows = list.map(function(r) {
        var btns = '';
        if (r.status !== '錄取')  btns += '<button class="action sm" style="margin:2px;" onclick="updateReg(\'' + esc(r.regId) + '\',\'錄取\')">錄取</button>';
        if (r.status !== '候補')  btns += '<button class="ghost sm" style="margin:2px;" onclick="updateReg(\'' + esc(r.regId) + '\',\'候補\')">候補</button>';
        if (r.status !== '婉拒')  btns += '<button class="ghost sm" style="margin:2px;color:#999;border-color:#ddd;" onclick="updateReg(\'' + esc(r.regId) + '\',\'婉拒\')">婉拒</button>';
        return '<tr><td>' + esc(r.name) + '</td><td>' + esc(r.email) + '</td>' +
          '<td>' + esc(r.phone) + '</td><td>' + esc(r.identity) + '</td>' +
          '<td>' + esc(r.points) + '</td><td>' + esc(r.regTime) + '</td>' +
          '<td><span class="status s-' + esc(r.status) + '">' + esc(r.status) + '</span></td>' +
          '<td style="white-space:nowrap;">' + btns + '</td></tr>';
      }).join('');
      ct.innerHTML = '<table><tr><th>姓名</th><th>Email</th><th>電話</th><th>身份</th><th>記點</th><th>報名時間</th><th>狀態</th><th>操作</th></tr>' + rows + '</table>';
    }).catch(function(e) { document.getElementById('adm-content').innerHTML = '<div class="center err">錯誤：' + esc(e.message) + '</div>'; });
  }
  function updateReg(regId, status) {
    api('adminUpdateRegistration', { regId: regId, status: status }).then(function() {
      loadAdminRegs();
    }).catch(function(e) { alert('錯誤：' + (e.message || e)); });
  }

  function loadAdminAttendance() {
    var ct = document.getElementById('adm-content');
    if (!ADMIN_COURSE) { ct.innerHTML = '<div class="center">請先選擇課程</div>'; return; }
    ct.innerHTML = '<div class="center">載入中…</div>';
    Promise.all([
      api('adminGetRegistrations', { courseId: ADMIN_COURSE }),
      api('getAttendance', { courseId: ADMIN_COURSE })
    ]).then(function(res) {
      var list = res[0], attMap = res[1];
      var active = list.filter(function(r) { return r.status === '錄取'; });
      if (!active.length) { ct.innerHTML = '<div class="center">此課程目前沒有「錄取」狀態的學員</div>'; return; }
      var ATT_OPTS = ['出席','事前請假','臨時請假','缺席'];
      var POINT_LABEL = { '出席':'0點','事前請假':'0點','臨時請假':'+1點','缺席':'+2點' };
      var rows = active.map(function(r) {
        var cur = attMap[(r.email || '').toLowerCase()] || '出席';
        var selOpts = ATT_OPTS.map(function(o) {
          return '<option value="' + o + '"' + (cur === o ? ' selected' : '') + '>' + o + '（' + POINT_LABEL[o] + '）</option>';
        }).join('');
        return '<tr data-regid="' + esc(r.regId) + '" data-email="' + esc(r.email) + '" data-courseid="' + esc(ADMIN_COURSE) + '">' +
          '<td>' + esc(r.name) + '</td><td>' + esc(r.email) + '</td><td>' + esc(r.identity) + '</td>' +
          '<td><select class="att-sel" style="padding:5px;border:1px solid #ccc;border-radius:6px;">' + selOpts + '</select></td></tr>';
      }).join('');
      ct.innerHTML =
        '<p class="hint">記點規則：臨時請假（課前3日內）+1點，缺席+2點，出席/事前請假不計點。<br>重複送出會以最新紀錄覆蓋（差值補正）。</p>' +
        '<table><tr><th>姓名</th><th>Email</th><th>身份</th><th>出席狀態</th></tr>' + rows + '</table>' +
        '<p style="margin-top:14px;"><button class="action" id="att-btn" onclick="submitAttendance()">送出出勤紀錄</button>' +
        '　<span id="att-msg" class="hint"></span></p>';
    }).catch(function(e) { ct.innerHTML = '<div class="center err">錯誤：' + esc(e.message) + '</div>'; });
  }
  function submitAttendance() {
    var rows = document.querySelectorAll('#adm-content table tr[data-regid]');
    var records = [];
    rows.forEach(function(tr) {
      records.push({
        regId:       tr.dataset.regid,
        email:       tr.dataset.email,
        courseId:    tr.dataset.courseid,
        attendStatus: tr.querySelector('.att-sel').value
      });
    });
    var btn = document.getElementById('att-btn');
    var msg = document.getElementById('att-msg');
    btn.disabled = true; btn.textContent = '送出中…';
    api('recordAttendance', { records: records }).then(function(result) {
      msg.className = 'hint ok'; msg.textContent = '已登記 ' + result.recorded + ' 筆！';
      btn.disabled = false; btn.textContent = '送出出勤紀錄';
    }).catch(function(e) {
      msg.className = 'hint err'; msg.textContent = e.message || e;
      btn.disabled = false; btn.textContent = '送出出勤紀錄';
    });
  }

  function showErr(e) { panel().innerHTML = '<div class="center err">發生錯誤：' + esc(e.message || e) + '</div>'; }
</script>
</body>
</html>
